name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --no-cache

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect integration tests
        id: detect
        run: |
          if find tests/integration -name '*.test.js' -print -quit 2>/dev/null | grep -q .; then
            echo 'has_tests=true' >> "$GITHUB_OUTPUT"
          else
            echo 'has_tests=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests
        if: steps.detect.outputs.has_tests == 'true'
        run: npm run test:integration -- --no-cache

      - name: Skip integration tests
        if: steps.detect.outputs.has_tests != 'true'
        run: echo 'No integration tests found. Skipping.'

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect e2e tests
        id: detect
        run: |
          if find tests/e2e -name '*.test.js' -print -quit 2>/dev/null | grep -q .; then
            echo 'has_tests=true' >> "$GITHUB_OUTPUT"
          else
            echo 'has_tests=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Run e2e tests
        if: steps.detect.outputs.has_tests == 'true'
        run: npm run test:e2e -- --no-cache

      - name: Skip e2e tests
        if: steps.detect.outputs.has_tests != 'true'
        run: echo 'No e2e tests found. Skipping.'

  build:
    name: Build Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Build extension packages
        run: make build VERSION=ci-${{ github.run_number }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proxy-assistant-build-${{ github.run_number }}
          path: build/ProxyAssistant_*
          if-no-files-found: error
